
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Fast</title>
    <style>
        /* منع أي تحديد أو تحديد للنصوص تماماً */
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: #0b0e18; color: white; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .speed-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-bg {
            width: 100%;
            height: 100%;
            border: 6px solid #00d2ff;
            border-radius: 50%;
            background: radial-gradient(circle, #1a2035 0%, #0b0e18 100%);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            z-index: 1;
        }

        .go-text {
            font-size: 60px;
            font-weight: bold;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        /* الطبقة الشفافة التي تمنع التحديد وتستقبل الضغط حصراً */
        .click-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 10; /* أعلى من كل شيء */
            cursor: pointer;
        }

        #status { margin-top: 40px; font-size: 18px; color: #888; transition: 0.3s; }
        video, canvas { display: none; }
    </style>
</head>
